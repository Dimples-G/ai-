name: AI Daily News

on:
  schedule:
    # 每天早上7:00推送（北京时间）
    # UTC时间 = 北京时间 - 8小时
    - cron: '0 23 * * *'
  workflow_dispatch:  # 允许手动触发测试

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run daily news script
        run: python fetch_news.py
